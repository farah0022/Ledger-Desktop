name: Build & Release

# Triggered by pushing a tag like v0.37.0.
# Builds unsigned installers for Windows + macOS + Linux and auto-attaches
# them to the GitHub Release.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build (unsigned)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: yarn build --publish never

      - name: Upload installers to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: false
          files: |
            dist_electron/bundled/*.exe
            dist_electron/bundled/*.dmg
            dist_electron/bundled/*.zip
            dist_electron/bundled/*.AppImage
            dist_electron/bundled/*.deb
            dist_electron/bundled/*.blockmap
            dist_electron/bundled/latest*.yml
