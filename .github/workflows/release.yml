name: Build & Release

# Triggered by pushing a tag like v0.37.0.
# Builds unsigned installers for Windows + macOS and uploads them as artifacts.
# Attach them to the GitHub Release manually, or extend this job to use
# softprops/action-gh-release when you have signing + a publishing strategy.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build (unsigned)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: yarn build --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ledger-desktop-${{ matrix.os }}
          path: dist_electron/bundled/*
          if-no-files-found: warn
          retention-days: 30
