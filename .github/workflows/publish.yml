name: Publish

# Manual workflow_dispatch only. The previous version of this workflow tried to
# sign installers (CSC_LINK, APPLE_*) on every run, which fails because this repo
# does not have those secrets configured. This version builds unsigned installers
# and uploads them as workflow artifacts instead. Tag-push releases are handled
# by release.yml.

on: workflow_dispatch

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'yarn'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build (unsigned)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: yarn build --mac --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-macOS
          path: dist_electron/bundled/*
          if-no-files-found: warn
          retention-days: 14

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'yarn'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build (unsigned)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn build --linux --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: dist_electron/bundled/*
          if-no-files-found: warn
          retention-days: 14

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'yarn'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build (unsigned)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: yarn build --win --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: dist_electron/bundled/*
          if-no-files-found: warn
          retention-days: 14
